name: Apply portable release preparation

on:
  push:
    branches:
      - feat/portable-launchers
    paths:
      - .github/workflows/apply-portable-release-prep.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: windows-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/portable-launchers
          fetch-depth: 0

      - name: Apply portable paths, launchers, docs and tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest

          $utf8Bom = [Text.UTF8Encoding]::new($true)
          $utf8NoBom = [Text.UTF8Encoding]::new($false)
          $repoRoot = [IO.Path]::GetFullPath($env:GITHUB_WORKSPACE)

          # WinBreak.ps1: log e backup accanto allo script, non hardcoded in C:\WinBreak.
          $scriptPath = Join-Path $repoRoot 'WinBreak.ps1'
          $scriptText = [IO.File]::ReadAllText($scriptPath)
          $oldRootBlock = @'
          $script:WinBreakLogPath = $null
          $script:WinBreakLogRoot = 'C:\WinBreak\logs'
          $script:WinBreakBackupRoot = 'C:\WinBreak\backup'
          $script:WinBreakCleanupFailed = $false
          '@
          $newRootBlock = @'
          $script:WinBreakRoot = [IO.Path]::GetFullPath($PSScriptRoot)
          $script:WinBreakLogPath = $null
          $script:WinBreakLogRoot = Join-Path -Path $script:WinBreakRoot -ChildPath 'logs'
          $script:WinBreakBackupRoot = Join-Path -Path $script:WinBreakRoot -ChildPath 'backup'
          $script:WinBreakCleanupFailed = $false
          '@

          if (-not $scriptText.Contains($oldRootBlock)) {
              throw 'Blocco hardcoded log/backup non trovato in WinBreak.ps1.'
          }

          $scriptText = $scriptText.Replace($oldRootBlock, $newRootBlock)
          [IO.File]::WriteAllText($scriptPath, $scriptText, $utf8Bom)

          # Launcher normale.
          $launcher = @'
          @echo off
          setlocal

          powershell.exe ^
            -NoLogo ^
            -NoProfile ^
            -ExecutionPolicy Bypass ^
            -File "%~dp0WinBreak.ps1" %*

          set "WINBREAK_EXIT_CODE=%ERRORLEVEL%"

          echo.
          echo WinBreak terminato con exit code %WINBREAK_EXIT_CODE%.
          pause

          exit /b %WINBREAK_EXIT_CODE%
          '@
          [IO.File]::WriteAllText(
              (Join-Path $repoRoot 'Start-WinBreak.cmd'),
              ($launcher.TrimStart() + "`r`n"),
              [Text.Encoding]::ASCII
          )

          # Launcher DryRun.
          $dryRunLauncher = @'
          @echo off
          call "%~dp0Start-WinBreak.cmd" -DryRun %*
          exit /b %ERRORLEVEL%
          '@
          [IO.File]::WriteAllText(
              (Join-Path $repoRoot 'Start-WinBreak-DryRun.cmd'),
              ($dryRunLauncher.TrimStart() + "`r`n"),
              [Text.Encoding]::ASCII
          )

          # Test dei percorsi portabili e della presenza dei launcher.
          $testsPath = Join-Path $repoRoot 'tests\WinBreak.Tests.ps1'
          $testsText = [IO.File]::ReadAllText($testsPath)
          $testsMarker = "    Context 'Nomi ISO' {"
          $portableTests = @'
              Context 'Percorsi portabili del progetto' {
                  It 'deriva root, log e backup dalla directory di WinBreak.ps1' {
                      $expectedRoot = [IO.Path]::GetFullPath($projectRoot)

                      $script:WinBreakRoot | Should -Be $expectedRoot
                      $script:WinBreakLogRoot | Should -Be (Join-Path -Path $expectedRoot -ChildPath 'logs')
                      $script:WinBreakBackupRoot | Should -Be (Join-Path -Path $expectedRoot -ChildPath 'backup')
                  }

                  It 'include entrambi i launcher portabili' {
                      Test-Path -LiteralPath (Join-Path $projectRoot 'Start-WinBreak.cmd') -PathType Leaf |
                          Should -Be $true
                      Test-Path -LiteralPath (Join-Path $projectRoot 'Start-WinBreak-DryRun.cmd') -PathType Leaf |
                          Should -Be $true
                  }
              }

              Context 'Nomi ISO' {
          '@
          $portableTests = ($portableTests -replace '(?m)^ {10}', '')

          if (-not $testsText.Contains($testsMarker)) {
              throw 'Punto di inserimento dei test portabili non trovato.'
          }

          $testsText = $testsText.Replace($testsMarker, $portableTests.TrimEnd())
          [IO.File]::WriteAllText($testsPath, $testsText, $utf8Bom)

          # README completo e coerente con Release ZIP e Download ZIP della branch.
          $readme = @'
          # WinBreak

          **Windows 11 Requirements Patcher**  
          Versione **0.1.0**  
          Federico Girolami / CodeCorn Technology

          WinBreak è uno script interattivo per Windows 11 e Windows PowerShell 5.1 che prepara una copia locale di un supporto di installazione Windows 11 destinata a sistemi con requisiti hardware non supportati.

          Lo script individua e convalida una ISO, mostra le edizioni disponibili, configura i bypass Registry usati da Microsoft Setup, copia il supporto in una directory di lavoro e rimuove `sources\appraiserres.dll` dalla sola copia. Al termine può aprire il normale installer grafico oppure creare una nuova ISO avviabile con `oscdimg.exe`.

          WinBreak non modifica `install.wim`, `install.esd` o `install.swm`, non usa DISM per alterare immagini e non avvia `setup.exe` con parametri nascosti o non documentati.

          ## Avvertenze importanti

          - Eseguire un backup completo dei dati importanti prima di procedere.
          - L'installazione su hardware non supportato può causare problemi di compatibilità, affidabilità, assistenza o disponibilità degli aggiornamenti.
          - La verifica del supporto controlla struttura e leggibilità dei metadati: **non è una verifica crittografica** dell'autenticità o dell'integrità della ISO.
          - La rimozione di `appraiserres.dll` e i valori Registry descritti qui non garantiscono il superamento di ogni controllo.
          - Microsoft può cambiare il comportamento di Windows Setup. Non è garantito che WinBreak funzioni con ogni build futura.
          - La directory di lavoro è una copia temporanea completa del supporto. Non usarla per conservare altri file.

          ## Requisiti

          - Windows 11.
          - Windows PowerShell 5.1 avviato **come Administrator**.
          - Una ISO di Windows 11 leggibile, con build 22000 o successiva.
          - Spazio libero sufficiente per la copia del supporto e, se richiesta, per la nuova ISO.
          - `robocopy.exe`, incluso in Windows.
          - Per creare una nuova ISO: Windows ADK con il componente **Deployment Tools**, che fornisce `oscdimg.exe`.

          WinBreak non installa moduli, non scarica software e non apre automaticamente un browser. Pester e PSScriptAnalyzer sono facoltativi e vengono usati per lo sviluppo soltanto se già presenti.

          ## Download e installazione

          WinBreak non richiede un installer e può essere eseguito da qualsiasi directory locale.

          ### Metodo consigliato: GitHub Release

          1. Aprire la sezione **Releases** del repository.
          2. Scaricare `WinBreak-0.1.0.zip` dalla release più recente.
          3. Fare clic destro sul file ZIP e scegliere **Estrai tutto**.
          4. Estrarre il contenuto in una directory locale, per esempio `C:\WinBreak`.

          La struttura risultante sarà:

          ```text
          C:\WinBreak\
          |-- WinBreak.ps1
          |-- Start-WinBreak.cmd
          |-- Start-WinBreak-DryRun.cmd
          |-- README.md
          |-- CHANGELOG.md
          `-- tests\
              `-- WinBreak.Tests.ps1
          ```

          Non eseguire WinBreak direttamente dall'interno del file ZIP: estrarre sempre tutti i file prima dell'avvio.

          Se non è ancora disponibile una release, usare temporaneamente il download della branch `main` descritto qui sotto.

          ### Download della branch `main`

          Il pulsante GitHub **Code → Download ZIP** scarica lo stato corrente del repository, non il pacchetto di una release.

          Dopo l'estrazione la directory si chiamerà normalmente:

          ```text
          WinBreak-main
          ```

          WinBreak funziona anche da questa directory: non è necessario rinominarla o spostarla in `C:\WinBreak`.

          Per un utilizzo normale è comunque preferibile una versione stabile pubblicata nella sezione **Releases**.

          ## Avvio facile

          Aprire la directory estratta, fare clic destro su:

          ```text
          Start-WinBreak.cmd
          ```

          e scegliere **Esegui come amministratore**.

          Il launcher usa sempre `WinBreak.ps1` presente nella sua stessa directory e avvia Windows PowerShell 5.1 con un'Execution Policy temporanea valida soltanto per quel processo.

          WinBreak controlla comunque i privilegi. Se non è stato avviato come Administrator mostra:

          ```text
          RUNNAMI COME ADMINISTRATOR!
          ```

          e termina senza tentare l'auto-elevazione.

          ## DryRun facile

          Per simulare il flusso senza eseguire operazioni sul sistema, fare clic destro su:

          ```text
          Start-WinBreak-DryRun.cmd
          ```

          e scegliere **Esegui come amministratore**.

          Anche la modalità DryRun richiede una console Administrator.

          In DryRun WinBreak descrive le operazioni previste, ma non:

          - scrive nel Registry;
          - monta o smonta immagini;
          - esegue `robocopy`;
          - elimina file;
          - avvia `setup.exe`;
          - esegue `oscdimg.exe`.

          Poiché la ISO non viene montata, struttura, metadati ed edizioni vengono indicati come controlli non eseguiti e non come verifiche superate.

          ## Avvio manuale da PowerShell

          In alternativa ai launcher, aprire **Windows PowerShell 5.1 come Administrator** e spostarsi nella directory in cui è stato estratto WinBreak.

          Esempio con la directory consigliata:

          ```powershell
          Set-Location "C:\WinBreak"
          Set-ExecutionPolicy -Scope Process Bypass -Force
          & ".\WinBreak.ps1"
          ```

          La modifica dell'Execution Policy vale soltanto per la sessione PowerShell corrente e non modifica permanentemente la configurazione del sistema.

          ### DryRun manuale

          Anche prima del DryRun deve essere impostata l'Execution Policy per il processo corrente:

          ```powershell
          Set-Location "C:\WinBreak"
          Set-ExecutionPolicy -Scope Process Bypass -Force
          & ".\WinBreak.ps1" -DryRun
          ```

          Se è stato usato **Code → Download ZIP**, specificare il percorso reale della directory estratta, per esempio:

          ```powershell
          Set-Location "$env:USERPROFILE\Downloads\WinBreak-main"
          Set-ExecutionPolicy -Scope Process Bypass -Force
          & ".\WinBreak.ps1" -DryRun
          ```

          ## File generati

          Log e backup vengono creati accanto a `WinBreak.ps1`, indipendentemente dal nome o dalla posizione della directory estratta:

          ```text
          <directory WinBreak>\
          |-- logs\
          |   `-- WinBreak-YYYYMMDD-HHMMSS.log
          `-- backup\
              |-- registry-YYYYMMDD-HHMMSS-xxxxxxxx.json
              `-- YYYYMMDD-HHMMSS-xxx\
                  `-- appraiserres.dll
          ```

          I percorsi operativi predefiniti sono:

          | Percorso | Uso |
          | --- | --- |
          | `<directory WinBreak>\logs\` | Log di console e diagnostica |
          | `<directory WinBreak>\backup\` | Backup Registry e backup verificato di `appraiserres.dll` |
          | `C:\Win11ISO` | Copia di lavoro del supporto Windows |
          | `C:\Windows11Modded.iso` | ISO prodotta con `oscdimg.exe` |

          Il backup JSON registra lo stato precedente dei valori Registry, ma WinBreak non esegue un ripristino automatico.

          ## Parametri

          | Parametro | Descrizione | Predefinito |
          | --- | --- | --- |
          | `-DryRun` | Simula le operazioni con effetti sul sistema. | Disattivato |
          | `-KeepMounted` | Non smonta una ISO montata da WinBreak. | Disattivato |
          | `-WorkDirectory` | Directory della copia di lavoro. | `C:\Win11ISO` |
          | `-OutputIso` | Percorso della ISO generata. | `C:\Windows11Modded.iso` |

          Esempio manuale con percorsi personalizzati:

          ```powershell
          Set-Location "C:\WinBreak"
          Set-ExecutionPolicy -Scope Process Bypass -Force

          & ".\WinBreak.ps1" `
              -WorkDirectory "D:\WinBreak Work\Win11ISO" `
              -OutputIso "D:\ISO\Windows11Modded.iso"
          ```

          ## Modalità interattiva

          ### 1. Selezione e verifica della ISO

          WinBreak cerca, senza scansione ricorsiva, file ISO compatibili in:

          - `C:\`;
          - `%USERPROFILE%\Downloads`.

          È anche possibile digitare o trascinare nella console un percorso assoluto. Sono supportati percorsi tra virgolette, spazi, variabili ambiente, `~` e completamento con Tab. Escape annulla l'inserimento.

          Prima di procedere, WinBreak controlla che il percorso indichi un file `.iso` reale e non vuoto. Dopo il mount verifica almeno:

          - `setup.exe`;
          - `boot\etfsboot.com`;
          - `efi\microsoft\boot`;
          - `sources\boot.wim`;
          - uno fra `sources\install.wim`, `sources\install.esd` e `sources\install.swm`.

          I metadati del payload vengono letti con `Get-WindowsImage` senza alterarlo. La tabella mostra indice, nome, EditionId, architettura e versione di ciascuna immagine. Il supporto è accettato soltanto se contiene almeno un'immagine leggibile e tutte le immagini rilevate hanno build 22000 o successiva.

          Se l'immagine era già montata, WinBreak riutilizza il mount e non la smonta automaticamente. Se viene montata da WinBreak, viene smontata al termine della copia o durante il cleanup, salvo uso di `-KeepMounted`.

          ### 2. Configurazione Registry

          WinBreak registra lo stato precedente in un backup JSON, applica in modo idempotente questi DWORD e li rilegge immediatamente per verificarli:

          ```text
          HKLM\SYSTEM\Setup\LabConfig\BypassTPMCheck = 1
          HKLM\SYSTEM\Setup\LabConfig\BypassSecureBootCheck = 1
          HKLM\SYSTEM\Setup\MoSetup\AllowUpgradesWithUnsupportedTPMOrCPU = 1
          ```

          Sono valori Registry della macchina locale, non variabili d'ambiente. WinBreak non usa `SetX`, non riavvia Explorer e non riavvia PowerShell.

          ### 3. Preparazione della copia

          La destinazione predefinita è `C:\Win11ISO`. Se esiste ed è vuota può essere riutilizzata. Se contiene file, WinBreak richiede di scegliere se eliminarla e ricrearla, usare un'altra directory o annullare: non viene mai cancellata senza una scelta esplicita.

          Prima della copia vengono controllati dimensione stimata, spazio libero e separazione tra sorgente e destinazione. La copia usa `robocopy` con almeno:

          ```text
          /MIR /R:2 /W:2 /XJ
          ```

          `/MIR` rende la destinazione uno specchio della sorgente e può rimuovere dalla destinazione elementi non presenti nella sorgente. Per questo `WorkDirectory` deve essere una directory dedicata e priva di dati personali. Gli exit code `0`-`7` sono considerati non bloccanti; `8` o superiore indica un errore.

          ### 4. Patch della copia

          Con la directory di lavoro predefinita, WinBreak opera sul file:

          ```text
          C:\Win11ISO\sources\appraiserres.dll
          ```

          Prima della rimozione ne registra dimensione e SHA256 e ne salva una copia verificata nella directory `backup` accanto a `WinBreak.ps1`. Se il file è già assente, viene mostrato un avviso e serve una conferma esplicita per continuare. Il file `appraiser.dll` non viene rimosso.

          ## Opzioni finali

          ### Avvia aggiornamento Windows 11

          Dopo conferma e countdown annullabile, con la directory di lavoro predefinita WinBreak avvia esclusivamente:

          ```text
          C:\Win11ISO\setup.exe
          ```

          Il programma non passa argomenti a Setup, non attende la fine dell'aggiornamento e non tenta di determinarne automaticamente l'esito. In particolare non usa `/product server`, `/compat ignorewarning`, `/auto upgrade`, comandi DISM o altri parametri nascosti.

          WinBreak **non elimina la directory di lavoro durante l'aggiornamento**. Dopo avere completato e verificato manualmente l'aggiornamento, eliminare la directory di lavoro a mano quando non serve più.

          ### Crea ISO modificata

          Questa opzione richiede `oscdimg.exe` del Windows ADK Deployment Tools. WinBreak lo cerca nel `PATH` e nelle installazioni ADK locali plausibili; se non lo trova, spiega il requisito e torna al menu senza installare o modificare nulla.

          La ISO generata include il boot BIOS tramite `boot\etfsboot.com` e il boot UEFI tramite `efisys.bin`, oppure `efisys_noprompt.bin` se necessario. L'output esistente non viene sovrascritto senza conferma. Al termine WinBreak richiede exit code zero, file non vuoto, calcola SHA256 e apre Explorer evidenziando il file.

          Dopo una creazione riuscita, usando il valore predefinito, compare:

          ```text
          Rimuovere ora C:\Win11ISO? [S/N]
          ```

          Soltanto una risposta esplicita `S` autorizza il cleanup, dopo i controlli che impediscono l'eliminazione di radice del volume, profilo utente, directory di sistema, directory di output o percorsi non validi.

          ### Esci senza avviare nulla

          Termina normalmente senza avviare Setup o creare una ISO. La directory di lavoro non viene eliminata automaticamente.

          ## Log, errori e recupero

          Ogni operazione importante viene riportata in console e nel log con livello `INFO`, `SUCCESS`, `WARN`, `ERROR` o `DEBUG`. In caso di errore WinBreak:

          - mostra un messaggio sintetico;
          - salva i dettagli nel log;
          - smonta soltanto le immagini che aveva montato, se dovuto;
          - conserva la directory di lavoro;
          - indica il percorso del log e termina con exit code non zero.

          Se l'esecuzione viene interrotta, controllare il log più recente nella directory `logs` accanto a `WinBreak.ps1` e verificare manualmente lo stato del mount e della directory di lavoro prima di riprovare.

          ## Test non distruttivi

          Lo sviluppo non richiede né autorizza un'esecuzione end-to-end. La sintassi può essere verificata con il parser nativo di PowerShell:

          ```powershell
          $tokens = $null
          $errors = $null

          [System.Management.Automation.Language.Parser]::ParseFile(
              ".\WinBreak.ps1",
              [ref]$tokens,
              [ref]$errors
          ) > $null

          $errors
          ```

          Se Pester è già installato, eseguire i test puri e isolati con:

          ```powershell
          Invoke-Pester ".\tests\WinBreak.Tests.ps1"
          ```

          Non eseguire lo script completo come test: un'esecuzione reale può montare supporti, modificare il Registry, copiare o eliminare file e avviare programmi soltanto dopo le conferme previste.

          ## Limitazioni note

          - WinBreak non certifica provenienza, firma o hash ufficiale della ISO.
          - Non converte né modifica i payload WIM, ESD o SWM.
          - Il payload deve essere leggibile dalla versione locale di `Get-WindowsImage`; se un `install.swm` non è supportato o leggibile dal cmdlet, la validazione termina in sicurezza senza ricorrere a DISM CLI o conversioni.
          - Non crea la ISO senza un'installazione locale di Windows ADK Deployment Tools.
          - Non ripristina automaticamente i valori Registry precedenti.
          - Non monitora l'upgrade e non elimina automaticamente la copia usata da Setup.
          - Nessun bypass può garantire supporto hardware, aggiornamenti o compatibilità con future versioni di Windows 11.
          '@
          $readme = ($readme -replace '(?m)^ {10}', '')
          [IO.File]::WriteAllText(
              (Join-Path $repoRoot 'README.md'),
              ($readme.TrimStart() + "`n"),
              $utf8NoBom
          )

          # Changelog 0.1.0 aggiornato con portabilità e fix DryRun.
          $changelog = @'
          # Changelog

          Tutte le modifiche rilevanti di WinBreak sono documentate in questo file.

          Il formato segue i principi di [Keep a Changelog](https://keepachangelog.com/it-IT/1.1.0/) e il progetto usa il versionamento semantico.

          ## [0.1.0] - 2026-07-11

          ### Aggiunto

          - Prima versione di WinBreak per Windows PowerShell 5.1.
          - Banner adattivo a colori, controllo Administrator e gestione centralizzata di log ed errori.
          - Ricerca non ricorsiva delle ISO in `C:\` e `%USERPROFILE%\Downloads`, selezione interattiva e inserimento percorso con completamento Tab.
          - Validazione del file ISO, mount sicuro con rilevamento della proprietà del mount e timeout per la lettera di unità.
          - Controllo della struttura del supporto e lettura non distruttiva delle edizioni Windows tramite `Get-WindowsImage`.
          - Validazione Windows 11 basata su struttura, metadati leggibili e build minima 22000.
          - Backup JSON dello stato Registry, applicazione idempotente e verifica dei bypass TPM, Secure Boot e CPU.
          - Preparazione sicura della directory di lavoro, stima dello spazio richiesto e copia con `robocopy`.
          - Rimozione verificata di `sources\appraiserres.dll`, con hash SHA256 e backup verificato.
          - Avvio del normale `setup.exe` grafico senza argomenti, preceduto da conferma e countdown annullabile.
          - Creazione facoltativa di una ISO BIOS/UEFI con `oscdimg.exe`, verifica dell'output e hash SHA256.
          - Cleanup protetto della directory di lavoro, eseguito soltanto dopo conferma esplicita.
          - Parametri `-DryRun`, `-KeepMounted`, `-WorkDirectory` e `-OutputIso`.
          - Launcher `Start-WinBreak.cmd` e `Start-WinBreak-DryRun.cmd` per l'avvio semplificato dalla directory estratta.
          - Percorsi portabili per log e backup, derivati dalla directory reale di `WinBreak.ps1` tramite `$PSScriptRoot`.
          - Test Pester non distruttivi per logica pura, percorsi, menu, exit code, build, cleanup, argomenti `oscdimg`, DryRun, portabilità e gestione di `appraiserres.dll`.
          - Documentazione italiana per Release ZIP, Download ZIP della branch, avvio facile, avvio manuale, sicurezza, limiti e recupero.

          ### Corretto

          - Il DryRun non inventa più una lettera di unità ISO e non dipende dalle unità di rete mappate da Parallels o dalla sessione utente.
          - La preparazione del comando `robocopy` non usa più `Join-Path` su una radice volume non montata.
          - Le istruzioni DryRun includono esplicitamente l'Execution Policy temporanea richiesta dalla sessione PowerShell.

          ### Sicurezza

          - Nessuna modifica dei payload `install.wim`, `install.esd` o `install.swm`.
          - Nessun download automatico, auto-elevazione, parametro nascosto di Setup o uso di `Invoke-Expression`.
          - Nessuna eliminazione automatica di una directory di lavoro non vuota e nessun cleanup dopo l'avvio dell'upgrade.
          - Smontaggio automatico limitato alle immagini montate da WinBreak, salvo `-KeepMounted`.
          - Modalità DryRun senza scritture Registry, mount, copie, eliminazioni, avvio di Setup o esecuzione di `oscdimg.exe`.

          ### Limitazioni

          - La validazione del supporto è strutturale e basata sulla leggibilità dei metadati; non è crittografica.
          - La creazione della ISO richiede Windows ADK Deployment Tools già installato.
          - Il comportamento di Microsoft Setup può cambiare e l'efficacia del metodo non è garantita per build future.
          '@
          $changelog = ($changelog -replace '(?m)^ {10}', '')
          [IO.File]::WriteAllText(
              (Join-Path $repoRoot 'CHANGELOG.md'),
              ($changelog.TrimStart() + "`n"),
              $utf8NoBom
          )

          # Verifica parser nativo Windows PowerShell 5.1.
          $parserCheck = @'
          $ErrorActionPreference = 'Stop'
          $tokens = $null
          $parseErrors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
              (Join-Path $PWD 'WinBreak.ps1'),
              [ref]$tokens,
              [ref]$parseErrors
          ) > $null
          if (@($parseErrors).Count -gt 0) {
              $parseErrors | Format-List -Force | Out-String | Write-Error
              exit 1
          }
          '@
          & powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -Command $parserCheck
          if ($LASTEXITCODE -ne 0) {
              throw "Parser Windows PowerShell 5.1 fallito con exit code $LASTEXITCODE."
          }

          # Suite Pester isolata. L'installazione avviene solo nel runner CI.
          Install-Module Pester -MinimumVersion 5.5.0 -Scope CurrentUser -Force -SkipPublisherCheck
          Import-Module Pester -MinimumVersion 5.5.0 -Force
          $pesterResult = Invoke-Pester -Path (Join-Path $repoRoot 'tests\WinBreak.Tests.ps1') -PassThru
          if ($pesterResult.FailedCount -gt 0) {
              throw "Pester ha rilevato $($pesterResult.FailedCount) test falliti."
          }

      - name: Commit verified changes
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          Remove-Item -LiteralPath '.github/workflows/apply-portable-release-prep.yml' -Force

          git add --all
          git diff --cached --check
          git commit -m "feat: add portable launchers and simplify installation"
          git push origin HEAD:feat/portable-launchers
