name: WinBreak v0.1.2 release

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/winbreak-v0.1.2-release.yml

permissions:
  contents: write

jobs:
  release:
    if: github.repository == 'fgirolami29/WinBreak'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      VERSION: 0.1.2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Guard release version
        shell: bash
        run: |
          set -euo pipefail

          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists."
            exit 1
          fi

          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists."
            exit 1
          fi

      - name: Apply patch
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/patch-v0.1.2.py
          rm scripts/patch-v0.1.2.py

      - name: Validate PowerShell and release archive
        shell: bash
        run: |
          set -euo pipefail

          pwsh -NoLogo -NoProfile -Command '
            $tokens = $null
            $errors = $null

            [System.Management.Automation.Language.Parser]::ParseFile(
                (Join-Path $PWD "WinBreak.ps1"),
                [ref]$tokens,
                [ref]$errors
            ) > $null

            if (@($errors).Count -gt 0) {
                $errors | Format-List -Force
                exit 1
            }

            Write-Host "PowerShell parser: OK"
          '

          git diff --check
          chmod +x scripts/build-release.sh
          ./scripts/build-release.sh

      - name: Commit and push v0.1.2
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            WinBreak.ps1 \
            README.md \
            CHANGELOG.md \
            .gitignore \
            scripts/build-release.sh \
            scripts/patch-v0.1.2.py

          git commit -m "fix: launch setup unelevated and clean release archive"
          git push origin HEAD:main

      - name: Tag and publish GitHub Release
        shell: bash
        run: |
          set -euo pipefail

          git tag -a "v${VERSION}" -m "WinBreak v${VERSION}"
          git push origin "v${VERSION}"

          gh release create "v${VERSION}" \
            "dist/WinBreak-${VERSION}.zip" \
            "dist/WinBreak-${VERSION}.sha256" \
            --verify-tag \
            --title "WinBreak ${VERSION}" \
            --notes-file "RELEASE_NOTES_v${VERSION}.md"
